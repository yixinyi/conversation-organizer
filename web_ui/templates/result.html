<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion Complete</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Conversion Complete!</h1>
        <p class="summary">
            Successfully converted <strong>{{ file_count }}</strong> conversation(s)
            from <strong>{{ provider }}</strong> into markdown files.
        </p>

        <div class="file-list">
            <div class="file-list-title">Generated Files</div>
            {% for file in files %}
                <div class="file-item">📄 {{ file }}</div>
            {% endfor %}
            <div class="output-dir">📁 Location: {{ output_dir }}</div>
        </div>

        <div class="actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">Convert Another</a>
        </div>
    </div>
</body>
</html>
